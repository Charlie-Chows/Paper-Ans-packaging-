<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Page Not Found | Artic Paper</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        /* ── Reset & Base ──────────────────────────────────── */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --gold: #c8a55c;
            --gold-light: #e2cc8f;
            --gold-dark: #a6843a;
            --dark: #0a0a0a;
            --dark-lighter: #141414;
            --dark-card: #161616;
            --cream: #f8f5f0;
            --cream-muted: #e8e4df;
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.6);
            --text-tertiary: rgba(255, 255, 255, 0.35);
        }

        html {
            font-size: 16px;
            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--dark);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* ── Grain / Texture Overlay ──────────────────────── */
        .grain-overlay {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            opacity: 0.035;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            background-repeat: repeat;
            background-size: 200px 200px;
        }

        /* ── Particle Canvas ─────────────────────────────── */
        #particle-canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        /* ── Ambient Glow ────────────────────────────────── */
        .ambient-glow {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            pointer-events: none;
            z-index: 0;
        }

        .ambient-glow--1 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(200, 165, 92, 0.08) 0%, transparent 70%);
            top: -150px;
            right: -100px;
        }

        .ambient-glow--2 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(200, 165, 92, 0.05) 0%, transparent 70%);
            bottom: -100px;
            left: -100px;
        }

        /* ── Header / Nav ────────────────────────────────── */
        .header {
            position: relative;
            z-index: 10;
            padding: 28px 48px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo img {
            height: 70px;
            filter: brightness(0) saturate(100%) invert(78%) sepia(45%) saturate(600%) hue-rotate(350deg) brightness(105%) contrast(100%);
            transition: opacity 0.3s ease;
        }

        .logo:hover img {
            opacity: 0.8;
        }

        .header-nav {
            display: flex;
            align-items: center;
            gap: 32px;
        }

        .header-nav a {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .header-nav a:hover {
            color: var(--gold);
        }

        /* ── Main Content ────────────────────────────────── */
        .error-container {
            position: relative;
            z-index: 10;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 0 24px;
            margin-top: -40px;
        }

        /* ── 404 Number ──────────────────────────────────── */
        .error-number {
            font-family: 'Playfair Display', serif;
            font-size: clamp(8rem, 20vw, 16rem);
            font-weight: 700;
            line-height: 1;
            color: transparent;
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 40%, var(--gold-dark) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            position: relative;
            user-select: none;
            margin-bottom: 8px;
            opacity: 0;
        }

        .error-number::after {
            content: '404';
            position: absolute;
            inset: 0;
            font-family: inherit;
            font-size: inherit;
            font-weight: inherit;
            line-height: inherit;
            color: transparent;
            background: linear-gradient(135deg, rgba(200, 165, 92, 0.25) 0%, rgba(212, 183, 106, 0.1) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            filter: blur(30px);
            z-index: -1;
            animation: glowPulse 4s ease-in-out infinite;
        }

        @keyframes glowPulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.03); }
        }

        /* ── Decorative Line ─────────────────────────────── */
        .divider {
            width: 60px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            margin: 24px auto;
            opacity: 0;
        }

        /* ── Heading ─────────────────────────────────────── */
        .error-heading {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.5rem, 3vw, 2.2rem);
            font-weight: 500;
            color: var(--cream);
            letter-spacing: 0.02em;
            margin-bottom: 16px;
            opacity: 0;
        }

        /* ── Message ─────────────────────────────────────── */
        .error-message {
            font-family: 'Inter', sans-serif;
            font-size: clamp(0.9rem, 1.5vw, 1.05rem);
            font-weight: 300;
            color: var(--text-secondary);
            line-height: 1.7;
            max-width: 460px;
            margin: 0 auto 40px;
            opacity: 0;
        }

        /* ── CTA Button ──────────────────────────────────── */
        .cta-button {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.82rem;
            font-weight: 600;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--dark);
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
            padding: 18px 42px;
            border: none;
            border-radius: 0;
            text-decoration: none;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: transform 0.35s cubic-bezier(0.22, 1, 0.36, 1), box-shadow 0.35s ease;
            opacity: 0;
        }

        .cta-button::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, var(--gold-light) 0%, #dcc580 100%);
            opacity: 0;
            transition: opacity 0.35s ease;
        }

        .cta-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(200, 165, 92, 0.25);
        }

        .cta-button:hover::before {
            opacity: 1;
        }

        .cta-button span,
        .cta-button i {
            position: relative;
            z-index: 1;
        }

        .cta-button i {
            font-size: 0.75rem;
            transition: transform 0.3s ease;
        }

        .cta-button:hover i {
            transform: translateX(-3px);
        }

        /* ── Footer ──────────────────────────────────────── */
        .footer {
            position: relative;
            z-index: 10;
            padding: 28px 48px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .footer-text {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.72rem;
            font-weight: 400;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-tertiary);
        }

        /* ── Corner Accents ──────────────────────────────── */
        .corner-accent {
            position: fixed;
            width: 80px;
            height: 80px;
            z-index: 5;
            pointer-events: none;
            opacity: 0.15;
        }

        .corner-accent--tl {
            top: 20px;
            left: 20px;
            border-top: 1px solid var(--gold);
            border-left: 1px solid var(--gold);
        }

        .corner-accent--br {
            bottom: 20px;
            right: 20px;
            border-bottom: 1px solid var(--gold);
            border-right: 1px solid var(--gold);
        }

        /* ── Responsive ──────────────────────────────────── */
        @media (max-width: 768px) {
            .header {
                padding: 20px 24px;
            }

            .header-nav {
                display: none;
            }

            .logo img {
                height: 45px;
            }

            .error-container {
                margin-top: -20px;
            }

            .cta-button {
                padding: 16px 36px;
                font-size: 0.78rem;
            }

            .footer {
                padding: 20px 24px;
            }

            .corner-accent {
                width: 40px;
                height: 40px;
            }
        }

        @media (max-width: 480px) {
            .header {
                padding: 16px 20px;
            }

            .logo img {
                height: 38px;
            }

            .divider {
                margin: 18px auto;
            }

            .error-message {
                margin-bottom: 32px;
            }

            .cta-button {
                padding: 15px 30px;
                font-size: 0.75rem;
                letter-spacing: 0.1em;
            }

            .corner-accent {
                display: none;
            }
        }
    </style>
</head>
<body>

    <!-- Grain Texture Overlay -->
    <div class="grain-overlay"></div>

    <!-- Particle Canvas -->
    <canvas id="particle-canvas"></canvas>

    <!-- Ambient Glows -->
    <div class="ambient-glow ambient-glow--1"></div>
    <div class="ambient-glow ambient-glow--2"></div>

    <!-- Corner Accents -->
    <div class="corner-accent corner-accent--tl"></div>
    <div class="corner-accent corner-accent--br"></div>

    <!-- Header -->
    <header class="header">
        <a href="index.html" class="logo"><img src="logo.webp" alt="Artic Paper" /></a>
        <nav class="header-nav">
            <a href="index.html"><i class="fas fa-arrow-left" style="margin-right:6px;font-size:0.65rem;"></i> Home</a>
        </nav>
    </header>

    <!-- Main Content -->
    <main class="error-container">
        <div class="error-number" id="error-number">404</div>
        <div class="divider" id="divider"></div>
        <h1 class="error-heading" id="error-heading">Page Not Found</h1>
        <p class="error-message" id="error-message">
            The page you're looking for seems to have drifted away. 
            It may have been moved, renamed, or no longer exists.
        </p>
        <a href="index.html" class="cta-button" id="cta-button">
            <i class="fas fa-arrow-left"></i>
            <span>Back to Home</span>
        </a>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <p class="footer-text">&copy; 2026 Artic Paper &mdash; Premium Paper &amp; Packaging</p>
    </footer>

    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script>
        /* ── Particle System ──────────────────────────────── */
        (function () {
            const canvas = document.getElementById('particle-canvas');
            const ctx = canvas.getContext('2d');
            let particles = [];
            let animFrame;

            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }

            function createParticles() {
                particles = [];
                const count = Math.min(Math.floor((canvas.width * canvas.height) / 18000), 60);
                for (let i = 0; i < count; i++) {
                    particles.push({
                        x: Math.random() * canvas.width,
                        y: Math.random() * canvas.height,
                        radius: Math.random() * 1.2 + 0.3,
                        opacity: Math.random() * 0.3 + 0.05,
                        vx: (Math.random() - 0.5) * 0.15,
                        vy: (Math.random() - 0.5) * 0.15,
                        pulseSpeed: Math.random() * 0.008 + 0.003,
                        pulseOffset: Math.random() * Math.PI * 2
                    });
                }
            }

            function drawParticles(time) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach(p => {
                    p.x += p.vx;
                    p.y += p.vy;

                    if (p.x < -10) p.x = canvas.width + 10;
                    if (p.x > canvas.width + 10) p.x = -10;
                    if (p.y < -10) p.y = canvas.height + 10;
                    if (p.y > canvas.height + 10) p.y = -10;

                    const pulse = Math.sin(time * p.pulseSpeed + p.pulseOffset) * 0.5 + 0.5;
                    const alpha = p.opacity * (0.5 + pulse * 0.5);

                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(200, 165, 92, ${alpha})`;
                    ctx.fill();
                });

                animFrame = requestAnimationFrame(drawParticles);
            }

            resize();
            createParticles();
            drawParticles(0);

            window.addEventListener('resize', () => {
                resize();
                createParticles();
            });
        })();

        /* ── GSAP Entrance & Float Animation ─────────────── */
        document.addEventListener('DOMContentLoaded', () => {
            const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });

            // Entrance sequence
            tl.to('#error-number', {
                opacity: 1,
                y: 0,
                duration: 1.2,
                delay: 0.3,
                from: { y: 40 }
            })
            .fromTo('#error-number', { y: 40 }, { y: 0, opacity: 1, duration: 1.2 }, 0.3)
            .fromTo('#divider', { scaleX: 0, opacity: 0 }, { scaleX: 1, opacity: 1, duration: 0.8 }, 0.8)
            .fromTo('#error-heading', { y: 20, opacity: 0 }, { y: 0, opacity: 1, duration: 0.9 }, 1.0)
            .fromTo('#error-message', { y: 20, opacity: 0 }, { y: 0, opacity: 1, duration: 0.9 }, 1.2)
            .fromTo('#cta-button', { y: 20, opacity: 0 }, { y: 0, opacity: 1, duration: 0.9 }, 1.4);

            // Floating animation on the 404 number
            gsap.to('#error-number', {
                y: -12,
                duration: 3,
                ease: 'sine.inOut',
                repeat: -1,
                yoyo: true,
                delay: 1.8
            });

            // Subtle glow scaling on ambient lights
            gsap.to('.ambient-glow--1', {
                scale: 1.15,
                opacity: 0.9,
                duration: 5,
                ease: 'sine.inOut',
                repeat: -1,
                yoyo: true
            });

            gsap.to('.ambient-glow--2', {
                scale: 1.1,
                opacity: 0.85,
                duration: 6,
                ease: 'sine.inOut',
                repeat: -1,
                yoyo: true,
                delay: 1
            });

            // Corner accent fade-in
            gsap.fromTo('.corner-accent', 
                { opacity: 0 }, 
                { opacity: 0.15, duration: 2, delay: 0.5, stagger: 0.3 }
            );
        });
    </script>
</body>
</html>
